name: Download & Release PDFs

on:
  push:
  workflow_dispatch:
    inputs:
      papers:
        description: 'Papers to download ("all", "5-8", "9")'
        required: false
        default: "5-8"
      tag:
        description: 'Release tag (e.g. "2026-03"). Defaults to YYYY-MM.'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Resolve inputs
        id: cfg
        run: |
          PAPERS="${{ github.event.inputs.papers }}"
          TAG="${{ github.event.inputs.tag }}"
          BRANCH="${{ github.ref_name }}"
          [ -z "$PAPERS" ] && PAPERS="5-8"
          if [ -z "$TAG" ]; then
            DATE="$(date -u +%Y-%m)"
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
              TAG="$DATE"
            else
              TAG="$DATE-$BRANCH"
            fi
          fi
          echo "papers=$PAPERS" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"

      - name: Download PDFs + generate release notes
        run: |
          RELEASE_BASE="https://github.com/${{ github.repository }}/releases/download/${{ steps.cfg.outputs.tag }}"
          ./target/release/qps "${{ steps.cfg.outputs.papers }}" \
            --release-base "$RELEASE_BASE" \
            --tag "${{ steps.cfg.outputs.tag }}"

      - name: Collect assets
        id: collect
        run: |
          mkdir -p staging
          find p* -name "*.pdf" | sort | while read f; do
            cp "$f" "staging/$(basename "$f")"
          done
          COUNT=$(ls staging/*.pdf 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Staged $COUNT PDFs"

      - name: Fail if nothing downloaded
        if: steps.collect.outputs.count == '0'
        run: |
          echo "::error::No PDFs downloaded. Check ICMAI availability."
          exit 1

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cfg.outputs.tag }}
          name: "CMA Inter G1 QPS — ${{ steps.cfg.outputs.tag }}"
          body_path: release_notes.md
          files: staging/*
          fail_on_unmatched_files: false
