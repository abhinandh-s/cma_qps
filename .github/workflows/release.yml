name: Download & Release PDFs

on:
  push:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            staging 
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Download PDFs + generate release notes
        run: |
          DATE="$(date -u +%Y-%m-%d_%H:%M)"
          RELEASE_BASE="https://github.com/${{ github.repository }}/releases/download/${{ steps.cfg.outputs.tag }}"
          cargo run "8-12" \
            --release-base "$RELEASE_BASE" \
            --tag "$DATE"

      - name: Collect assets
        id: collect
        run: |
          mkdir -p staging
          find p* -name "*.pdf" | sort | while read f; do
            cp "$f" "staging/$(basename "$f")"
          done
          COUNT=$(ls staging/*.pdf 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Staged $COUNT PDFs"

      - name: Fail if nothing downloaded
        if: steps.collect.outputs.count == '0'
        run: |
          echo "::error::No PDFs downloaded. Check ICMAI availability."
          exit 1

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cfg.outputs.tag }}
          name: "CMA Inter G1 QPS — ${{ steps.cfg.outputs.tag }}"
          body_path: release_notes.md
          files: staging/*
          fail_on_unmatched_files: false
